name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: CI only reads the repo. No job publishes releases, writes
# packages, or comments, so the default broad token scopes are unnecessary.
permissions:
  contents: read

jobs:
  lint:
    name: lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Create venv and install
        run: |
          uv venv --python 3.12
          uv pip install -e ".[dev]"
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Format check (ruff)
        run: uv run ruff format --check .
      - name: Typecheck (pyright)
        run: uv run pyright
      - name: Security (bandit)
        run: uvx --from bandit bandit -c pyproject.toml -r src -x tests
      - name: Dependency audit (pip-audit)
        run: uv run pip-audit

  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Create venv and install
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install -e ".[dev]"
      - name: Test (pytest + coverage)
        run: |
          uv run coverage run -m pytest
          uv run coverage report

  build:
    name: build (sdist + wheel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Build sdist and wheel
        run: uv build
      - name: Check artifacts
        run: |
          uvx twine check dist/*
          ls -l dist
      - name: Smoke-install the wheel and import
        run: |
          uv venv --python 3.12
          uv pip install dist/*.whl
          uv run python -c "import portable_attention as pa; print(pa.__version__)"
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
